  <rect x="820" y="452" width="64" height="8"  fill="#6b4c2a"/>
  <rect x="824" y="442" width="56" height="10" fill="#7a5a30"/>
  <rect x="826" y="460" width="8"  height="16" fill="#5a3f1e"/>
  <rect x="866" y="460" width="8"  height="16" fill="#5a3f1e"/>

  <!-- Fountain (center background) -->
  <rect x="552" y="386" width="96" height="58" rx="4" fill="#2a3a4a"/>
  <rect x="560" y="392" width="80" height="44" rx="3" fill="#3a7a9a" opacity="0.6"/>
  <rect x="598" y="366" width="4"  height="24" fill="#88ccee" opacity="0.8"/>
  <rect x="590" y="374" width="4"  height="16" fill="#88ccee" opacity="0.5"/>
  <rect x="606" y="374" width="4"  height="16" fill="#88ccee" opacity="0.5"/>

