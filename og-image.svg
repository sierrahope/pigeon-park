  <rect x="464" y="486" width="22" height="13" fill="#9898a8"/>
  <rect x="468" y="477" width="13" height="11" fill="#a8a8b8"/>
  <rect x="480" y="481" width="9"  height="7"  fill="#c0c0c8"/>
  <rect x="466" y="499" width="7"  height="9"  fill="#9898a8"/>
  <rect x="477" y="499" width="7"  height="9"  fill="#9898a8"/>

  <!-- White pigeon (center) -->
  <rect x="584" y="489" width="22" height="13" fill="#dcdce8"/>
  <rect x="588" y="480" width="13" height="11" fill="#ebebf2"/>
  <rect x="600" y="484" width="9"  height="7"  fill="#9060c0"/>
  <rect x="586" y="502" width="7"  height="9"  fill="#dcdce8"/>
  <rect x="597" y="502" width="7"  height="9"  fill="#dcdce8"/>

  <!-- Brown pigeon (right) -->
  <rect x="690" y="483" width="22" height="13" fill="#8b6d4a"/>
  <rect x="694" y="474" width="13" height="11" fill="#9b7d5a"/>
  <rect x="706" y="478" width="9"  height="7"  fill="#d8d8d8"/>
  <rect x="692" y="496" width="7"  height="9"  fill="#8b6d4a"/>
