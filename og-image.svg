  <rect x="556" y="499" width="7" height="5" fill="#d4a055" opacity="0.85"/>
  <rect x="630" y="497" width="6" height="4" fill="#d4a055" opacity="0.85"/>
  <rect x="660" y="500" width="5" height="4" fill="#d4a055" opacity="0.7"/>

  <!-- Title -->
  <text
    x="600" y="268"
    font-family="'Courier New', Courier, monospace"
    font-size="96"
    font-weight="bold"
    fill="#f8fafc"
    text-anchor="middle"
    letter-spacing="4">Pigeon Park</text>

  <!-- Pigeon emoji either side of title -->
  <text x="196" y="268" font-size="72" text-anchor="middle">🐦</text>
  <text x="1004" y="268" font-size="72" text-anchor="middle">🐦</text>

  <!-- Subtitle -->
  <text
    x="600" y="330"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    fill="#64748b"
    text-anchor="middle"
    letter-spacing="3">a pixel art park game</text>
</svg>
