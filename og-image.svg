  <rect x="0" y="510" width="1200" height="120" fill="#1c3a1c"/>
  <rect x="0" y="507" width="1200" height="5" fill="#245c24"/>
  <!-- Path -->
  <rect x="0" y="477" width="1200" height="33" fill="#6b5e42"/>

  <!-- Left tree -->
  <rect x="56" y="310" width="30" height="200" fill="#3d2b1a"/>
  <rect x="6"  y="210" width="128" height="106" fill="#1a4d1a"/>
  <rect x="22" y="140" width="96"  height="76"  fill="#1e5c1e"/>
  <rect x="38" y="76"  width="64"  height="68"  fill="#246b24"/>

  <!-- Right tree -->
  <rect x="1114" y="310" width="30" height="200" fill="#3d2b1a"/>
  <rect x="1066" y="210" width="128" height="106" fill="#1a4d1a"/>
  <rect x="1082" y="140" width="96"  height="76"  fill="#1e5c1e"/>
